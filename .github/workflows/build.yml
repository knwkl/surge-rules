name: Build Surge Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set variables
        run: |
          echo "CHINA_URL=https://raw.githubusercontent.com/pmkol/easymosdns/rules/china_domain_list.txt" >> $GITHUB_ENV
          echo "GFW_URL=https://raw.githubusercontent.com/pmkol/easymosdns/rules/gfw_domain_list.txt" >> $GITHUB_ENV
          echo "AD_URL=https://raw.githubusercontent.com/pmkol/easymosdns/refs/heads/rules/ad_domain_list.txt" >> $GITHUB_ENV
          echo "CDN_URL=https://raw.githubusercontent.com/pmkol/easymosdns/refs/heads/rules/cdn_domain_list.txt" >> $GITHUB_ENV

      - name: Convert china domains
        run: |
          curl -sSL $CHINA_URL | awk '
            /^\s*$/ || /^\s*#/ { next }
            /^full:/ { sub(/^full:/, ""); print "DOMAIN," $0; next }
            /^regexp:/ { next }
            /^domain:/ { sub(/^domain:/, ""); print "DOMAIN-SUFFIX," $0; next }
            { print "DOMAIN-SUFFIX," $0 }
          ' > china.list

      - name: Convert gfw domains
        run: |
          curl -sSL $GFW_URL | awk '
            /^\s*$/ || /^\s*#/ { next }
            /^full:/ { sub(/^full:/, ""); print "DOMAIN," $0; next }
            /^regexp:/ { next }
            /^domain:/ { sub(/^domain:/, ""); print "DOMAIN-SUFFIX," $0; next }
            { print "DOMAIN-SUFFIX," $0 }
          ' > gfw.list

      - name: Convert ad domains
        run: |
          curl -sSL $AD_URL | awk '
            /^\s*$/ || /^\s*#/ { next }
            /^full:/ { sub(/^full:/, ""); print "DOMAIN," $0; next }
            /^regexp:/ { next }
            /^domain:/ { sub(/^domain:/, ""); print "DOMAIN-SUFFIX," $0; next }
            { print "DOMAIN-SUFFIX," $0 }
          ' > reject.list

      - name: Convert cdn domains
        run: |
          curl -sSL $CDN_URL | awk '
            /^\s*$/ || /^\s*#/ { next }
            /^full:/ { sub(/^full:/, ""); print "DOMAIN," $0; next }
            /^regexp:/ { next }
            /^domain:/ { sub(/^domain:/, ""); print "DOMAIN-SUFFIX," $0; next }
            /^domain:/ { sub(/^domain:/, ""); print "DOMAIN-SUFFIX," $0; next }
            { print "DOMAIN-SUFFIX," $0 }
          ' > cdn.list

      - name: Check for changes
        id: diff
        run: |
          # 拉取现有 release 分支（忽略失败，首次运行时分支不存在）
          mkdir prev
          curl -sSf "https://raw.githubusercontent.com/${{ github.repository }}/release/china.list" -o prev/china.list 2>/dev/null || true
          curl -sSf "https://raw.githubusercontent.com/${{ github.repository }}/release/gfw.list"   -o prev/gfw.list   2>/dev/null || true
          curl -sSf "https://raw.githubusercontent.com/${{ github.repository }}/release/reject.list" -o prev/reject.list 2>/dev/null || true
          curl -sSf "https://raw.githubusercontent.com/${{ github.repository }}/release/cdn.list"   -o prev/cdn.list   2>/dev/null || true

          NEW_HASH=$(cat china.list gfw.list reject.list cdn.list | sha256sum)
          OLD_HASH=$(cat prev/china.list prev/gfw.list prev/reject.list prev/cdn.list 2>/dev/null | sha256sum || echo "none")

          echo "new=$NEW_HASH"
          echo "old=$OLD_HASH"

          if [ "$NEW_HASH" = "$OLD_HASH" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push to release branch
        if: steps.diff.outputs.changed == 'true'
        run: |
          mkdir output && mv china.list gfw.list reject.list cdn.list output/
          cd output
          git config --global init.defaultBranch release
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Updated $(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release

      - name: No changes detected
        if: steps.diff.outputs.changed == 'false'
        run: echo "上游无更新，跳过推送。"
